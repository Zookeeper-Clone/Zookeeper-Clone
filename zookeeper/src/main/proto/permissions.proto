syntax = "proto3";

package zookeeper.auth;

option java_multiple_files = true;
option java_outer_classname = "PermissionsProto";
option java_package = "server.zookeeper.proto.permissions";

enum RequestType {
  REQUEST_TYPE_UNSPECIFIED = 0;
  GET = 1;
  SET_IS_ADMIN = 2;
  SET_CAN_CREATE_DIRECTORIES = 3;
  SET_DIRECTORY_PERMISSIONS = 4;
}

message UserPermissionsRequest {
  RequestType request_type = 1;
  string user_email = 2;
  string token = 3;
  UserPermissions user_permissions = 4;
}

message UserPermissionsResponse {
  bool success = 1;
  string error_message = 2;
  UserPermissions user_permissions = 3;
}

message UserPermissions {
  bool is_admin = 1;
  bool can_create_directories = 2;
  map<string, int32> directory_permissions = 3;
}